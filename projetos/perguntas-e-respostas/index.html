<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Perguntas e Respostas</title>
</head>
<body>
    <div class="title">
        <h1>Qual o cantor da banda <i>Charlie Brown JR.</i>?</h1>
    </div>

    <form action="">
        <!-- Opção 1 -->
        <div class="resposta"> 
            <span>Chorão</span>
            <input type="radio" name="pergunta1" value="correta">
        </div>

        <br>
        <!-- Opção 2 -->
        <div class="resposta">
            <span>Thiago</span>
            <input type="radio" name="pergunta2" value="incorreta">
        </div>
        <br>
        <!-- Opção 3 -->
        <div class="resposta">
            <span>Renato</span>
            <input type="radio" name="pergunta3" value="incorreta">
        </div>

    </form>

    <div class="title">
        <h1>Qual o guitarrista da banda <i>Charlie Brown JR.</i>?</h1>
    </div>

    <form action="">
        <!-- Opção 1 -->
        <div class="resposta">
            <span>Thiago</span>
            <input type="radio" name="pergunta1" value="correta">
        </div>
        <br>
        <!-- Opção 2 -->
        <div class="resposta">
            <span>Renato</span>
            <input type="radio" name="pergunta2" value="incorreta">
        </div>
        <br>
        <!-- Opção 3 -->
        <div class="resposta">
            <span>Champignon</span>
            <input type="radio" name="pergunta3" value="incorreta">
        </div>

    </form>

    <script src="index.js"></script>
</body>
</html>

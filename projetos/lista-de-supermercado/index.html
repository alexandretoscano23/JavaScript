<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Lista de Mercado</title>
</head>
<body>
    <header>
        <h2>App lista de Supermercado</h2>
    </header>

    <div class="lista-cadastro">
        <input type="text" name="nome_produto" id="" placeholder="nome do produto">

        <input type="number" name="valor_produto" id="" placeholder="valor do produto">

        <button value="submit">Cadastrar</button>

    </div>

    <div class="lista-produtos"></div>

    <div class="soma-produto">
        <h2>R$ 00.00</h2>
    </div>

    <button class="button2">Limpar Carrinho</button>

    <script src="index.js"></script>
</body>
</html>
